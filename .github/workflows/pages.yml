name: Publikacja GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4

      - name: Konfiguracja Pages
        uses: actions/configure-pages@v5

      - name: Przygotowanie plikow statycznych
        run: |
          mkdir -p _site/assets
          mkdir -p _site/output
          cp index.html _site/index.html
          cp style.css _site/style.css
          cp app.js _site/app.js
          cp README.md _site/README.md
          cp .nojekyll _site/.nojekyll
          cp -R assets/. _site/assets/
          cp -R output/. _site/output/

      - name: Wgranie artefaktu Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Wdrozenie na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
